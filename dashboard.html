<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduConnect - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>EduConnect</h2>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="doubts.html">💬 Doubts</a>
    <a href="notes.html">📄 Notes</a>

        <h3>📌 Assignments</h3>
        <p>Track tasks</p>
        <a href="assignments.html" class="btn">Open</a>
      </div>

      <div class="card">

        <a href="classroom.html" class="btn">Open</a>
