<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduConnect - Classroom</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>EduConnect</h2>

    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="doubts.html">💬 Doubts</a>
    <a href="notes.html">📄 Notes</a>
    <a href="assignments.html">📌 Assignments</a>
    <a href="classroom.html" class="active">🎓 Classroom</a>

    <button id="themeToggle">🌙</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <h1>🎓 Classroom</h1>

    <!-- CREATE CLASS -->
    <h3>Create Class</h3>
    <button onclick="createClass()" class="btn">Create</button>
    <p id="classCodeDisplay"></p>

    <!-- JOIN CLASS -->
    <h3>Join Class</h3>
    <input type="text" id="joinCode" placeholder="Enter class code">
    <button onclick="joinClass()" class="btn">Join</button>

    <!-- MEMBERS -->
    <h3>Members</h3>
    <ul id="memberList"></ul>

    <!-- ATTENDANCE -->
    <h3>📋 Attendance</h3>
    <button onclick="generateAttendance()" class="btn">Generate</button>
    <button onclick="exportPDF()" class="btn">📄 Export PDF</button>

    <ul id="attendanceList"></ul>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
