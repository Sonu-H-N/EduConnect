<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConnect — Classroom</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <span>EduConnect</span>
    </div>

    <div class="sidebar-section">Menu</div>
    <nav>
      <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="doubts.html"><span class="nav-icon">💬</span> Doubts</a>
      <a href="notes.html"><span class="nav-icon">📄</span> Notes</a>
      <a href="assignments.html"><span class="nav-icon">📌</span> Assignments</a>
      <a href="classroom.html" class="active"><span class="nav-icon">🎓</span> Classroom</a>
      <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="name" id="sidebarName">User</div>
          <div class="role" id="sidebarRole">student</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">

    <div class="page-header">
      <h1>🎓 Classroom</h1>
      <p>Create or join a class, take attendance, chat and meet live</p>
    </div>

    <!-- CREATE / JOIN -->
    <div class="panel">
      <h2>Create a Class</h2>
      <button class="btn btn-primary" onclick="createClass()">Create Class</button>
      <div id="classCodeDisplay"></div>
    </div>

    <div class="panel">
      <h2>Join a Class</h2>
      <div class="input-row">
        <input type="text" id="joinCode" class="input-field" placeholder="Enter class code">
        <button class="btn btn-primary" onclick="joinClass()">Join</button>
      </div>
    </div>

    <!-- MEMBERS -->
    <div class="panel">
      <h2>👥 Members</h2>
      <ul id="memberList"></ul>
    </div>

    <!-- ATTENDANCE -->
    <div class="panel">
      <h2>📋 Attendance</h2>
      <div class="input-row" style="margin-bottom:14px">
        <button class="btn btn-primary" onclick="generateAttendance()">Generate</button>
        <button class="btn btn-ghost" onclick="exportPDF()">📄 Export PDF</button>
      </div>
      <ul id="attendanceList"></ul>
    </div>

    <!-- CHAT + VIDEO -->
    <div class="chat-video-container">

      <div class="chat-box">
        <h3>💬 Classroom Chat</h3>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Type a message…">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>

      <div class="video-box">
        <h3>🎥 Live Video</h3>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-controls">
          <button class="btn btn-primary" onclick="startVideo()">Start</button>
          <button class="btn btn-ghost" onclick="stopVideo()">Stop</button>
        </div>
      </div>

    </div>

  </main>

</div>

<!-- THEME TOGGLE -->
<button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

<script src="script.js"></script>

</body>
</html>
