<div class="app-container">

  <div class="sidebar">

  <!-- Main Container -->
  <div class="doubts-container">

    <h1>Doubt Discussion 💬</h1>
    <p class="subtitle">Ask questions and get answers</p>

    <!-- Add Doubt -->
    <div class="add-doubt">
      <h3>Post a Doubt</h3>

      <input type="text" id="doubtInput" placeholder="Enter your question...">
      <button onclick="addDoubt()" class="btn">Post</button>
    </div>

    <!-- Doubts List -->

      <!-- Doubts will appear here -->
    </div>
