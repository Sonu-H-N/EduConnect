<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConnect — Doubts</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <span>EduConnect</span>
    </div>

    <div class="sidebar-section">Menu</div>
    <nav>
      <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="doubts.html" class="active"><span class="nav-icon">💬</span> Doubts</a>
      <a href="notes.html"><span class="nav-icon">📄</span> Notes</a>
      <a href="assignments.html"><span class="nav-icon">📌</span> Assignments</a>
      <a href="classroom.html"><span class="nav-icon">🎓</span> Classroom</a>
      <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="name" id="sidebarName">User</div>
          <div class="role" id="sidebarRole">student</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="content">

    <div class="page-header">
      <h1>💬 Doubts</h1>
      <p>Post a question, your class can see and help answer it</p>
    </div>

    <div class="panel">
      <h2>Ask a Doubt</h2>
      <div class="input-row">
        <input type="text" id="doubtInput" class="input-field" placeholder="Type your question…">
        <button class="btn btn-primary" onclick="addDoubt()">Post</button>
      </div>
    </div>

    <ul id="doubtList"></ul>

  </main>

</div>

<!-- THEME TOGGLE -->
<button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

<script src="script.js"></script>

</body>
</html>
