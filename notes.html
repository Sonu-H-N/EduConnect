<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConnect — Notes</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <span>EduConnect</span>
    </div>

    <div class="sidebar-section">Menu</div>
    <nav>
      <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="doubts.html"><span class="nav-icon">💬</span> Doubts</a>
      <a href="notes.html" class="active"><span class="nav-icon">📄</span> Notes</a>
      <a href="assignments.html"><span class="nav-icon">📌</span> Assignments</a>
      <a href="classroom.html"><span class="nav-icon">🎓</span> Classroom</a>
      <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="name" id="sidebarName">User</div>
          <div class="role" id="sidebarRole">student</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">

    <div class="page-header">
      <h1>📄 Notes</h1>
      <p>Save and manage your study materials</p>
    </div>

    <!-- Add Note -->
    <div class="panel">
      <h2>Add Note</h2>
      <div class="input-row" style="margin-bottom: 10px;">
        <input
          type="text"
          id="noteTitle"
          class="input-field"
          placeholder="Note title"
        >
      </div>
      <div class="input-row">
        <textarea
          id="noteContent"
          class="input-field"
          placeholder="Paste content, link, or any text…"
        ></textarea>
        <button class="btn btn-primary" onclick="addNote()" style="align-self:flex-end">Save</button>
      </div>
    </div>

    <!-- Notes List -->
    <div id="notesList"></div>

  </main>

</div>

<!-- THEME TOGGLE -->
<button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <h2>✏️ Edit Note</h2>
    <input type="hidden" id="editNoteId">

    <div class="form-group" style="margin-bottom:14px">
      <label style="font-size:13px;font-weight:600;color:var(--text-2);display:block;margin-bottom:6px">Title</label>
      <input type="text" id="editNoteTitle" class="input-field" style="width:100%">
    </div>

    <div class="form-group">
      <label style="font-size:13px;font-weight:600;color:var(--text-2);display:block;margin-bottom:6px">Content</label>
      <textarea id="editNoteContent" class="input-field" style="width:100%;min-height:100px"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditNote()">Save Changes</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
