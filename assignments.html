<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConnect — Assignments</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <span>EduConnect</span>
    </div>

    <div class="sidebar-section">Menu</div>
    <nav>
      <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="doubts.html"><span class="nav-icon">💬</span> Doubts</a>
      <a href="notes.html"><span class="nav-icon">📄</span> Notes</a>
      <a href="assignments.html" class="active"><span class="nav-icon">📌</span> Assignments</a>
      <a href="classroom.html"><span class="nav-icon">🎓</span> Classroom</a>
      <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="name" id="sidebarName">User</div>
          <div class="role" id="sidebarRole">student</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">

    <div class="page-header">
      <h1>📌 Assignments</h1>
      <p>Track and manage your academic tasks</p>
    </div>

    <!-- Add Assignment -->
    <div class="panel">
      <h2>Add Assignment</h2>
      <div class="input-row" style="margin-bottom:10px">
        <input
          type="text"
          id="assignmentTitle"
          class="input-field"
          placeholder="Assignment title (required)"
        >
      </div>
      <div class="input-row">
        <input
          type="text"
          id="assignmentDesc"
          class="input-field"
          placeholder="Description or link (optional)"
        >
        <button class="btn btn-primary" onclick="addAssignment()">Add</button>
      </div>
    </div>

    <!-- Assignment List -->
    <div id="assignmentList"></div>

  </main>

</div>

<!-- THEME TOGGLE -->
<button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

<script src="script.js"></script>
</body>
</html>
